site_name: StampFly Ecosystem
site_description: Educational drone control engineering platform
site_url: ""
docs_dir: ..
site_dir: /tmp/stampfly-docs-site

# Watch only directories containing Markdown docs (not entire repo)
# Markdown があるディレクトリのみ監視（全リポジトリは重すぎる）
watch:
  - ../docs
  - ../firmware
  - ../protocol
  - ../control
  - ../analysis
  - ../tools
  - ../simulator
  - ../ros
  - ../examples
  - ../README.md
  - ../PROJECT_PLAN.md

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切替
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ja
        - en
  - awesome-pages

extra_css:
  - docs/stylesheets/extra.css

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true
  - attr_list
  - def_list

# Exclude non-documentation directories from processing
# ドキュメント対象外のディレクトリを除外
exclude_docs: |
  site/
  .claude/
  _wip/
  knote/
  **/build/
  **/.cache/
  **/managed_components/
  **/node_modules/
  **/venv/
  **/__pycache__/
  third_party/

