site_name: StampFly Ecosystem
site_description: Educational drone control engineering platform
site_url: ""

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切替
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ja
        - en
  - awesome-pages

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true
  - attr_list
  - def_list

nav:
  - Home: index.md
  - 入門:
    - 概要: overview.md
    - クイックスタート: getting-started.md
    - セットアップ:
      - 概要: setup/README.md
      - macOS: setup/macos.md
      - Linux: setup/linux.md
      - Windows (WSL2): setup/windows.md
      - 教育向け: setup/education.md
      - WiFi STA: setup/wifi-sta.md
  - アーキテクチャ:
    - 制御系設計: architecture/control-system.md
    - 座標系: architecture/coordinate-systems.md
    - 物理パラメータ: architecture/stampfly-parameters.md
    - 制御配分: architecture/control-allocation-migration.md
    - Genesis 統合: architecture/genesis-integration.md
    - TDMA 通信: architecture/tdma-usage.md
    - Tello API: architecture/tello-api-reference.md
    - ROS2 UDP: architecture/ros2-udp-debug.md
  - sf CLI:
    - コマンド一覧: commands/README.md
    - sf version: commands/sf-version.md
    - sf doctor: commands/sf-doctor.md
    - sf setup: commands/sf-setup.md
    - sf build: commands/sf-build.md
    - sf flash: commands/sf-flash.md
    - sf monitor: commands/sf-monitor.md
    - sf log: commands/sf-log.md
    - sf sim: commands/sf-sim.md
    - sf cal: commands/sf-cal.md
  - ガイド:
    - 安全ガイド: guides/safety.md
    - トラブルシューティング: guides/troubleshooting.md
    - 用語集: guides/glossary.md
    - 開発ツール: guides/tools.md
    - フライトログ可視化: guides/flight-log-viz.md
  - 教育:
    - ワークショップ:
      - ガイド: workshop/workshop_guide.md
      - スケジュール: workshop/workshop_schedule.md
      - 競技ルール: workshop/competition_rules.md
      - スライド資料: slides.md
    - 大学講義:
      - シラバス: university/syllabus.md
      - 評価ルーブリック: university/assessment_rubric.md
  - 開発:
    - スタイルガイド: contributing/style-guide.md
    - コミット規約: contributing/commit-guidelines.md
    - コマンド追加: contributing/adding-sf-commands.md
    - FW コマンド追加: contributing/adding-firmware-commands.md
    - スキャフォールディング: contributing/scaffolding-tool.md
    - ドキュメント目録: DOCUMENT_INDEX.md
  - 計画:
    - エコシステム移行: plans/ecosystem-migration.md
    - インストーラ: plans/installer-architecture.md
    - Vehicle FW: plans/vehicle-firmware.md
    - HW テスト: plans/hardware-test.md
    - ROS2 統合: plans/ros2-integration.md
    - シミュレータ移行: plans/simulator-migration.md
